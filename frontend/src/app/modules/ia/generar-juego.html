<div class="contenedor">

  <h2>🎮 Generador de Juegos con IA</h2>

  <div class="form-group">
    <label>Proveedor IA</label>
    <select [(ngModel)]="proveedor">
      <option value="ollama">Ollama (local)</option>
      <option value="openai">OpenAI (API)</option>
    </select>
  </div>

  <div class="form-group" *ngIf="proveedor === 'ollama'">
    <label>Modelo</label>
    <select [(ngModel)]="modeloSeleccionado">
      <option *ngFor="let m of modelos" [value]="m">
        {{m}}
      </option>
    </select>
  </div>

  <div class="form-group">
    <label>Descripción del juego</label>
    <textarea
      [(ngModel)]="prompt"
      placeholder="Ej: 8 preguntas sobre el Inti Raymi en Ecuador..."
      rows="4">
    </textarea>
  </div>

  <button class="btn-generar" (click)="generar()">
    🚀 Generar Juego
  </button>

  <div *ngIf="cargando" class="loading">
    ⏳ Generando juego...
  </div>

<div 
  *ngIf="urlJuego" 
  class="preview-container"
  [class.fullscreen-mode]="fullscreen"
>
    <div class="preview-header">
      <h3>Vista previa</h3>

      <div class="acciones">
        <button (click)="copiarLink()">🔗 Copiar</button>
        <button (click)="compartir()">📤 Compartir</button>
        <a [href]="urlJuego" target="_blank">🌐 Abrir</a>
        <button (click)="toggleFullscreen()">
  {{ fullscreen ? '❌ Salir' : '🖥️ Pantalla completa' }}
</button>
      </div>
    </div>

  <iframe 
  [src]="urlJuegoSeguro"
  class="iframe-juego">
</iframe>

  </div>

</div>
