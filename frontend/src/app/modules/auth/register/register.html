<div class="login-container">

  <div class="login-card">

    <h2 class="titulo">Registro</h2>
    <p class="subtitulo">Crear nueva cuenta</p>

    <form (ngSubmit)="register()">

      <!-- NOMBRES -->
      <div class="campo">
        <label>Nombres</label>
        <div class="input-icon">
          <span class="material-icons">person</span>
          <input
            type="text"
            [(ngModel)]="usuario.nombres"
            name="nombres"
            required
          />
        </div>
      </div>

      <!-- APELLIDOS -->
      <div class="campo">
        <label>Apellidos</label>
        <div class="input-icon">
          <span class="material-icons">badge</span>
          <input
            type="text"
            [(ngModel)]="usuario.apellidos"
            name="apellidos"
            required
          />
        </div>
      </div>

      <!-- CORREO -->
      <div class="campo">
        <label>Correo</label>
        <div class="input-icon">
          <span class="material-icons">mail</span>
          <input
            type="email"
            [(ngModel)]="usuario.correo"
            name="correo"
            required
          />
        </div>
      </div>

      <!-- CONTRASEÑA -->
      <div class="campo">
        <label>Contraseña</label>
        <div class="input-icon">
          <span class="material-icons">lock</span>
          <input
            type="password"
            [(ngModel)]="usuario.contrasena"
            name="contrasena"
            required
          />
        </div>
      </div>

      <!-- ROLES -->
      <div class="campo">
        <label>Rol</label>
        <div class="input-icon select-icon">
          <span class="material-icons">groups</span>
          <select
            [(ngModel)]="usuario.idtipousuario"
            name="idtipousuario">

            <option [value]="2">Coordinador</option>
            <option [value]="3">Decano</option>
            <option [value]="4">Usuario Externo</option>
            <option [value]="5">Docente</option>

          </select>
        </div>
      </div>

      <!-- BOTÓN -->
      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Registrando...' : 'Crear cuenta' }}
      </button>

    </form>

    <!-- MENSAJES -->
    <p class="success" *ngIf="success">{{ success }}</p>
    <p class="error" *ngIf="error">{{ error }}</p>

    <!-- VOLVER -->
    <div class="registro-link">
      <span>¿Ya tienes cuenta?</span>
      <a routerLink="/auth/login">Iniciar sesión</a>
    </div>

  </div>

</div>
