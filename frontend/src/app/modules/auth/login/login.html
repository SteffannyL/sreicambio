<div class="login-container">

  <div class="login-card">

    <!-- HEADER -->
    <div class="header">
      <h1 class="titulo">SREI</h1>
      <p class="subtitulo">Sistema de Registro de Eventos Interculturales</p>
    </div>

    <form (ngSubmit)="login()">

      <!-- CORREO -->
      <div class="campo">
        <label>Correo</label>
        <div class="input-icon">
          <span class="material-icons">mail</span>
          <input
            type="email"
            [(ngModel)]="credentials.correo"
            name="correo"
            required
          />
        </div>
      </div>

      <!-- CONTRASEÑA -->
      <div class="campo">
        <label>Contraseña</label>
        <div class="input-icon">
          <span class="material-icons">lock</span>
          <input
            type="password"
            [(ngModel)]="credentials.contrasena"
            name="contrasena"
            required
          />
        </div>
      </div>

      <!-- BOTÓN LOGIN -->
      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>

      <!-- ERROR -->
      <p class="error" *ngIf="error">
        {{ error }}
      </p>

    </form>

    <!-- FOOTER -->
    <div class="registro-link">
      <span>¿No tienes cuenta?</span>
      <a routerLink="/auth/register">Crear cuenta</a>
    </div>

  </div>

</div>
