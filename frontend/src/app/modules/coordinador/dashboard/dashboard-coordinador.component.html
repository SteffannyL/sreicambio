<div class="dashboard">

  <h2>Dashboard Coordinador</h2>

  <div class="cards">

    <div class="card">
      <h3>Eventos Pendientes</h3>
      <p>{{ eventosPendientes }}</p>
    </div>

    <div class="card">
      <h3>Eventos Aprobados</h3>
      <p>{{ eventosAprobados }}</p>
    </div>

    <div class="card">
      <h3>Eventos Rechazados</h3>
      <p>{{ eventosRechazados }}</p>
    </div>

  </div>

  <div class="acciones">

    <h3>Gestión de Eventos</h3>

    <p>
      Aquí podrás revisar y aprobar los eventos enviados por los docentes.
    </p>

    <button (click)="irAprobarEventos()">
      Revisar eventos pendientes
    </button>

  </div>

</div>
