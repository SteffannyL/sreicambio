<div class="contenedor">

  <h2>Pendientes (Coordinación)</h2>
  <p>Aprueba o rechaza eventos pendientes.</p>

  <div *ngFor="let evento of eventos" class="card-evento">

    <h3>{{ evento.nombreevento }}</h3>

    <p class="fecha">
      {{ evento.fechainicio | date }}
    </p>

    <p>{{ evento.descripcion }}</p>

    <textarea
      [(ngModel)]="evento.comentario"
      placeholder="Observaciones (obligatorio si rechazas)">
    </textarea>

    <div class="botones">

      <button class="btn-aprobar"
              (click)="aprobar(evento)">
        ✔ Aprobar
      </button>

      <button class="btn-rechazar"
              (click)="rechazar(evento)">
        ✖ Rechazar
      </button>

    </div>

  </div>

</div>
