<div class="backup-container">

<h2>Gestión de Backups</h2>

<div class="acciones">

<button
class="btn-crear"
(click)="crearBackup()"
[disabled]="creando">

Crear Backup

</button>

<span class="mensaje" *ngIf="mensaje">
{{mensaje}}
</span>

</div>

<hr>

<div class="programacion">

<h3>Programar Backup por fecha</h3>

<div class="fila">

<input type="datetime-local"
[(ngModel)]="fechaProgramada">

<button
class="btn-programar"
(click)="programarFecha()">

Programar

</button>

</div>

</div>

<hr>

<div class="programacion">

<h3>Programar Backup automático</h3>

<div class="fila">

<input
type="number"
[(ngModel)]="intervaloTiempo">

<select [(ngModel)]="intervaloTipo">

<option value="minutos">Minutos</option>
<option value="horas">Horas</option>
<option value="dias">Días</option>
<option value="semanas">Semanas</option>

</select>

<button
class="btn-programar"
(click)="programarIntervalo()">

Programar automático

</button>
<button
class="btn-cancelar"
(click)="cancelarProgramacion()">

Cancelar backup automático

</button>

</div>

</div>

<hr>

<h3>Historial de Backups</h3>

<table class="tabla-backups">

<thead>

<tr>
<th>Backup</th>
<th>Fecha</th>
<th>Tamaño</th>
<th>Estado</th>
<th>Descargar</th>
<th>Restaurar</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let b of backups">

<td>{{b.nombreArchivo}}</td>

<td>{{b.fecha}}</td>

<td>{{ (b.tamano / 1024).toFixed(2) }} KB</td>

<td>

<span
class="estado-ok"
*ngIf="b.estado==='COMPLETADO'">

COMPLETADO

</span>

</td>

<td>

<button
class="btn-descargar"
(click)="descargar(b.nombreArchivo)">

Descargar

</button>

</td>

<td>

<button
class="btn-restaurar"
(click)="restaurar(b.nombreArchivo)">

Restaurar

</button>

</td>

</tr>

</tbody>

</table>

</div>
