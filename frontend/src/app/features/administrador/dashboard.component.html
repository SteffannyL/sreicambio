<h2>Dashboard</h2>

<div class="cards">

  <div class="card">
    <h3>Total Usuarios</h3>
    <p>{{totalUsuarios}}</p>
  </div>

  <div class="card">
    <h3>Usuarios Activos</h3>
    <p>{{activos}}</p>
  </div>

  <div class="card">
    <h3>Usuarios Inactivos</h3>
    <p>{{inactivos}}</p>
  </div>

</div>

<div class="graficos">

  <div class="grafico">
    <canvas id="graficoPie"></canvas>
  </div>

  <div class="grafico">
    <canvas id="graficoBarra"></canvas>
  </div>

</div>

<div class="grafico">
  <h3>Usuarios registrados por mes</h3>
  <canvas id="graficoLinea"></canvas>
</div>
