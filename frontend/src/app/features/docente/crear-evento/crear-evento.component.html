<div class="form-container">

  <h2 class="titulo">Crear Evento</h2>

  <form (ngSubmit)="confirmarEnvio(formEvento)" #formEvento="ngForm">

    <!-- Ámbito -->
    <div class="form-group">
      <label>Ámbito</label>

      <select
        [(ngModel)]="evento.idambito"
        name="idambito"
        required
        #idambito="ngModel"
        [class.invalido]="idambito.invalid && idambito.touched">

        <option [ngValue]="0">Seleccione</option>

        <option *ngFor="let a of ambitos" [ngValue]="a.idambito">
          {{ a.nombre }}
        </option>

      </select>

      <small *ngIf="idambito.invalid && idambito.touched">
        Debe seleccionar un ámbito
      </small>
    </div>

    <!-- Tipo evento -->
    <div class="form-group">
      <label>Tipo de evento</label>

      <select
        [(ngModel)]="evento.idtipoevento"
        name="idtipoevento"
        required
        #idtipoevento="ngModel"
        [class.invalido]="idtipoevento.invalid && idtipoevento.touched">

        <option [ngValue]="0">Seleccione</option>

        <option *ngFor="let t of tiposEvento" [ngValue]="t.idtipoevento">
          {{ t.nombre }}
        </option>

      </select>

      <small *ngIf="idtipoevento.invalid && idtipoevento.touched">
        Debe seleccionar un tipo de evento
      </small>
    </div>

    <!-- Nombre -->
    <div class="form-group">
      <label>Nombre del evento</label>

      <input
        type="text"
        [(ngModel)]="evento.nombreevento"
        name="nombreevento"
        required
        #nombre="ngModel"
        [class.invalido]="nombre.invalid && nombre.touched">

      <small *ngIf="nombre.invalid && nombre.touched">
        El nombre es obligatorio
      </small>
    </div>

    <!-- Descripción -->
    <div class="form-group">
      <label>Descripción</label>

      <textarea
        [(ngModel)]="evento.descripcion"
        name="descripcion"
        required
        #descripcion="ngModel"
        [class.invalido]="descripcion.invalid && descripcion.touched">
      </textarea>

      <small *ngIf="descripcion.invalid && descripcion.touched">
        La descripción es obligatoria
      </small>
    </div>

    <!-- Fecha inicio -->
    <div class="form-group">
      <label>Fecha inicio</label>

      <input
        type="datetime-local"
        [(ngModel)]="evento.fechainicio"
        name="fechainicio"
        [min]="fechaActual"
        required
        #inicio="ngModel"
        [class.invalido]="inicio.invalid && inicio.touched">
    </div>

    <!-- Fecha fin -->
    <div class="form-group">
      <label>Fecha fin</label>

      <input
        type="datetime-local"
        [(ngModel)]="evento.fechafin"
        name="fechafin"
        [min]="evento.fechainicio || fechaActual"
        required
        #fin="ngModel"
        [class.invalido]="
          (fin.invalid && fin.touched) ||
          (evento.fechainicio && evento.fechafin && evento.fechafin <= evento.fechainicio)
        ">

      <small *ngIf="evento.fechainicio && evento.fechafin && evento.fechafin <= evento.fechainicio">
        La fecha fin debe ser mayor a la fecha inicio
      </small>
    </div>

    <!-- Lugar -->
    <div class="form-group">
      <label>Lugar</label>

      <input
        type="text"
        [(ngModel)]="evento.lugar"
        name="lugar"
        required
        #lugar="ngModel"
        [class.invalido]="lugar.invalid && lugar.touched">
    </div>

    <!-- Aforo -->
    <div class="form-group">
      <label>Aforo</label>

      <input
        type="number"
        [(ngModel)]="evento.aforo"
        name="aforo"
        min="1"
        required
        #aforo="ngModel"
        [class.invalido]="aforo.invalid && aforo.touched">
    </div>

    <!-- IMAGEN (MEJORADO) -->
    <div class="form-group">
      <label>Imagen del evento</label>

      <label class="file-upload">
        <input
          type="file"
          accept="image/*"
          (change)="onImagenSeleccionada($event)">

        <span>
          {{ imagen ? imagen.name : 'Seleccionar imagen' }}
        </span>
      </label>
    </div>

    <!-- PDF (MEJORADO) -->
    <div class="form-group">
      <label>Documento PDF</label>

      <label class="file-upload pdf">
        <input
          type="file"
          accept="application/pdf"
          (change)="onPdfSeleccionado($event)">

        <span>
          {{ pdf ? pdf.name : 'Seleccionar PDF' }}
        </span>
      </label>
    </div>

    <!-- BOTÓN -->
    <div class="botones">
      <button
        type="submit"
        class="btn-guardar"
        [disabled]="
          formEvento.invalid ||
          evento.idambito === 0 ||
          evento.idtipoevento === 0 ||
          (evento.fechainicio && evento.fechafin && evento.fechafin <= evento.fechainicio)
        ">
        Crear Evento
      </button>
    </div>

    <!-- MENSAJE -->
    <p class="mensaje" *ngIf="mensaje">
      {{ mensaje }}
    </p>

  </form>

</div>
